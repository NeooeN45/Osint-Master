# =============================================================================
# Grafana Dashboard Provider Configuration
# =============================================================================

apiVersion: 1

providers:
  - name: 'OSINT Master Dashboards'
    orgId: 1
    folder: 'OSINT Master'
    folderUid: ''
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
